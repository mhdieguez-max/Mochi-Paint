<div id="app">
  <header class="appbar">
    <span class="logo"><span class="bead" aria-hidden="true">🍡</span><span class="logo-text"> Mochi Paint</span></span>
    <div class="actions">
      <a class="ibtn" id="homeBtn" href="/home" title="Back to home" aria-label="Back to home" style="text-decoration:none;display:inline-flex;align-items:center;justify-content:center;">🏡</a>
      <button class="ibtn" id="printBtn" title="Print coloring page" aria-label="Print coloring page">🖨️</button>
      <button class="ibtn" id="saveBtn" title="Save as PNG" aria-label="Save as PNG">💾</button>
      <button class="ibtn" id="shareBtn" title="Share to gallery" aria-label="Share to gallery" hidden>🌟</button>
      <button class="ibtn" id="galleryBtn" title="Community gallery" aria-label="Community gallery" hidden>🖼️</button>
    </div>
  </header>

  <main class="stage">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="board" aria-label="Drawing canvas"></canvas>
      <canvas id="lines" aria-hidden="true"></canvas>
      <div id="cursorRing"></div>
      <p class="hint" id="hint">Loading your coloring page…</p>
    </div>

    <aside class="rail" id="rail" aria-label="Drawing toolbar">
      <div class="drawer-head">
        <span class="drawer-title">Toolbox</span>
        <button class="drawer-close" id="drawerClose" aria-label="Close toolbar" title="Close">✕</button>
      </div>
      <div class="rail-tools" id="tools" role="toolbar" aria-label="Drawing tools">
        <button class="tbtn" data-tool="pencil" aria-pressed="true" aria-label="Pencil" title="Pencil"><svg class="ic" aria-hidden="true"><use href="#ic-pencil"/></svg><span>Pencil</span></button>
        <button class="tbtn" data-tool="marker" aria-pressed="false" aria-label="Marker" title="Marker"><svg class="ic" aria-hidden="true"><use href="#ic-marker"/></svg><span>Marker</span></button>
        <button class="tbtn" data-tool="crayon" aria-pressed="false" aria-label="Soft crayon" title="Soft crayon"><svg class="ic" aria-hidden="true"><use href="#ic-crayon"/></svg><span>Crayon</span></button>
        <button class="tbtn" data-tool="spray" aria-pressed="false" aria-label="Spray" title="Spray"><svg class="ic" aria-hidden="true"><use href="#ic-spray"/></svg><span>Spray</span></button>
        <button class="tbtn" data-tool="fill" aria-pressed="false" aria-label="Paint can" title="Paint can"><svg class="ic" aria-hidden="true"><use href="#ic-fill"/></svg><span>Paint can</span></button>
        <button class="tbtn" data-tool="eraser" aria-pressed="false" aria-label="Eraser" title="Eraser"><svg class="ic" aria-hidden="true"><use href="#ic-eraser"/></svg><span>Eraser</span></button>
      </div>
      <div class="rail-color">
        <button class="cc-btn" id="currentColor" aria-label="Current color" title="Current color — tap to change"><span class="cc-dot" id="ccDot"></span></button>
      </div>
      <div class="rail-colors" id="quickColors" role="group" aria-label="Quick colors">
        <button class="qsw" data-color="#E8443B" style="--c:#E8443B" aria-pressed="false" aria-label="Red" title="Red"></button>
        <button class="qsw" data-color="#F5892F" style="--c:#F5892F" aria-pressed="false" aria-label="Orange" title="Orange"></button>
        <button class="qsw light" data-color="#FFD23F" style="--c:#FFD23F" aria-pressed="false" aria-label="Yellow" title="Yellow"></button>
        <button class="qsw" data-color="#43A047" style="--c:#43A047" aria-pressed="false" aria-label="Green" title="Green"></button>
        <button class="qsw" data-color="#4FC3F7" style="--c:#4FC3F7" aria-pressed="false" aria-label="Light blue" title="Light blue"></button>
        <button class="qsw" data-color="#1E63C7" style="--c:#1E63C7" aria-pressed="false" aria-label="Dark blue" title="Dark blue"></button>
        <button class="qsw" data-color="#9B4DCA" style="--c:#9B4DCA" aria-pressed="false" aria-label="Purple" title="Purple"></button>
        <button class="qsw" data-color="#F06292" style="--c:#F06292" aria-pressed="false" aria-label="Pink" title="Pink"></button>
        <button class="qsw" data-color="#8D5A3B" style="--c:#8D5A3B" aria-pressed="false" aria-label="Brown" title="Brown"></button>
        <button class="qsw" data-color="#2B2B2B" style="--c:#2B2B2B" aria-pressed="false" aria-label="Black" title="Black"></button>
        <button class="qsw" data-color="#9E9E9E" style="--c:#9E9E9E" aria-pressed="false" aria-label="Gray" title="Gray"></button>
        <button class="qsw light" data-color="#FFFFFF" style="--c:#FFFFFF" aria-pressed="false" aria-label="White" title="White"></button>
        <button class="more-colors" id="moreColors" aria-label="More colors" title="More colors"><svg class="ic" aria-hidden="true"><use href="#ic-more"/></svg></button>
      </div>
      <div class="rail-size">
        <span class="lbl" aria-hidden="true"><svg class="ic-sm"><use href="#ic-size"/></svg></span>
        <input type="range" id="size" min="2" max="40" value="10" step="1" aria-label="Brush and stamp size">
        <span id="preview"><span id="previewDot"></span></span>
      </div>
      <div class="rail-history" role="group" aria-label="History">
        <button class="ibtn" id="undoBtn" title="Undo" aria-label="Undo"><svg class="ic" aria-hidden="true"><use href="#ic-undo"/></svg></button>
        <button class="ibtn" id="redoBtn" title="Redo" aria-label="Redo"><svg class="ic" aria-hidden="true"><use href="#ic-redo"/></svg></button>
        <button class="ibtn" id="clearBtn" title="Clear canvas" aria-label="Clear canvas"><svg class="ic" aria-hidden="true"><use href="#ic-clear"/></svg></button>
      </div>
      <div class="rail-setting">
        <button class="lh-toggle" id="leftHandBtn" role="switch" aria-checked="false" title="Left-handed mode">
          <span class="lh-ico" aria-hidden="true">🤚</span><span class="lh-txt">Left-handed</span>
        </button>
      </div>
    </aside>

    <!-- always-visible compact toolbar for mobile portrait; the full rail above becomes a drawer -->
    <div class="mini-rail" id="miniRail" aria-label="Quick tools">
      <button class="mini-btn drawer-open" id="drawerToggle" aria-expanded="false" aria-controls="rail" aria-label="Open toolbox" title="Open toolbox"><span class="mini-ham" aria-hidden="true"><i></i><i></i><i></i></span></button>
      <button class="mini-btn" id="miniTool" aria-label="Current tool — open toolbox" title="Tools"><svg class="ic" aria-hidden="true"><use href="#ic-pencil" id="miniToolUse"/></svg></button>
      <button class="mini-btn" id="miniEraser" aria-pressed="false" aria-label="Eraser" title="Eraser"><svg class="ic" aria-hidden="true"><use href="#ic-eraser"/></svg></button>
      <button class="mini-swatch" id="miniColor" aria-label="Current color — open colors" title="Colors"><span class="cc-dot" id="miniCcDot"></span></button>
      <div class="mini-favs" id="miniFavs" role="group" aria-label="Favorite colors">
        <button class="mfav" data-color="#E8443B" style="--c:#E8443B" aria-pressed="false" aria-label="Red" title="Red"></button>
        <button class="mfav" data-color="#FFD23F" style="--c:#FFD23F" aria-pressed="false" aria-label="Yellow" title="Yellow"></button>
        <button class="mfav" data-color="#4FC3F7" style="--c:#4FC3F7" aria-pressed="false" aria-label="Light blue" title="Light blue"></button>
        <button class="mfav" data-color="#43A047" style="--c:#43A047" aria-pressed="false" aria-label="Green" title="Green"></button>
      </div>
      <button class="mini-btn" id="miniSize" aria-label="Brush size — open toolbox" title="Brush size"><svg class="ic" aria-hidden="true"><use href="#ic-size"/></svg></button>
      <button class="mini-btn" id="miniUndo" aria-label="Undo" title="Undo"><svg class="ic" aria-hidden="true"><use href="#ic-undo"/></svg></button>
    </div>
    <div class="drawer-scrim" id="drawerScrim" hidden></div>
  </main>

  <nav class="dock">
    <div class="tabs" role="tablist">
      <button class="tab on" data-panel="panelColors" role="tab">🎨 Colors</button>
      <button class="tab" data-panel="panelPals" role="tab">🐾 Pals</button>
    </div>

    <div class="panel on" id="panelColors">
      <div class="hstrip" id="palette" aria-label="Colors"></div>
      <div class="hstrip" id="shades" aria-label="Shades"></div>
    </div>

    <div class="panel" id="panelPals">
      <div class="mode-row">
        <button class="chip on" id="modePage">🎨 Coloring page</button>
        <button class="chip" id="modeStamp">🐾 Sticker stamp</button>
      </div>
      <div class="hstrip pals" id="stampGrid"></div>
    </div>
  </nav>
</div>

<dialog id="shareDialog">
  <h2>Share to the gallery 🌟</h2>
  <form method="dialog" id="shareForm">
    <label for="artTitle">Title</label>
    <input id="artTitle" maxlength="60" placeholder="Sleepy puppy friends">
    <label for="artArtist">Your name</label>
    <input id="artArtist" maxlength="40" placeholder="Anonymous artist">
    <div class="dialog-actions">
      <button class="btn ghost" value="cancel">Cancel</button>
      <button class="btn" id="shareConfirm" value="ok">Share it</button>
    </div>
  </form>
</dialog>

<dialog id="galleryDialog">
  <h2>Community gallery 🖼️</h2>
  <div class="gallery-grid" id="galleryGrid"></div>
  <div class="dialog-actions">
    <button class="btn ghost" id="galleryClose">Close</button>
  </div>
</dialog>

<div id="toast" hidden></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js?v=2"></script>
<script src="pals.js?v=2"></script>
<script src="app.js?v=9"></script>
</body>
</html>
