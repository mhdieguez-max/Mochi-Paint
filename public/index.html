<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mochi Paint — kawaii coloring studio</title>
<meta name="description" content="A cozy kawaii coloring app: open a chunky pastel pal as a coloring page, fill inside the lines, shade with soft brushes, and stamp stickers.">
<meta name="theme-color" content="#FBE3EE">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">

<!-- Open Graph / social sharing -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Mochi Paint">
<meta property="og:title" content="Mochi Paint — kawaii coloring studio">
<meta property="og:description" content="A cozy kawaii coloring app: open a chunky pastel pal, fill inside the lines, shade with soft brushes, and stamp cute stickers.">

<meta name="twitter:title" content="Mochi Paint — kawaii coloring studio">
<meta name="twitter:description" content="A cozy kawaii coloring app: open a chunky pastel pal, fill inside the lines, shade with soft brushes, and stamp cute stickers.">
<meta name="twitter:image" content="https://summer-silence-662e.mhdieguez.workers.dev/share-card.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=11">
</head>
<body>

<div id="splash" aria-hidden="true">
  <div class="splash-inner">
    <span class="splash-mochi">🍡</span>
    <div class="splash-logo">Mochi Paint</div>
    <div class="splash-tag">kawaii coloring studio</div>
    <div class="splash-dots"><i></i><i></i><i></i><i></i></div>
  </div>
</div>
<script>
// Safety net: if anything goes wrong during boot, never strand users on the splash.
setTimeout(function () {
  var s = document.getElementById("splash");
  if (s) s.classList.add("done");
}, 6000);
</script>


<div id="app">
  <header class="appbar">
    <span class="logo"><span class="bead" aria-hidden="true">🍡</span><span class="logo-text"> Mochi Paint</span></span>
    <div class="actions">
      <a class="ibtn" id="homeBtn" href="/home" title="Back to home" aria-label="Back to home">
        <svg class="nav-ic" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M4 11.2 12 4.4l8 6.8" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.2 10.4v7.4c0 .9.7 1.6 1.6 1.6h8.4c.9 0 1.6-.7 1.6-1.6v-7.4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M10.2 19.4v-4.6c0-.7.6-1.3 1.3-1.3h1c.7 0 1.3.6 1.3 1.3v4.6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <button class="ibtn" id="printBtn" title="Print coloring page" aria-label="Print coloring page">
        <svg class="nav-ic" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M7 8V4.6c0-.6.5-1.1 1.1-1.1h7.8c.6 0 1.1.5 1.1 1.1V8" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6.5 16H5.1c-.9 0-1.6-.7-1.6-1.6V9.6C3.5 8.7 4.2 8 5.1 8h13.8c.9 0 1.6.7 1.6 1.6v4.8c0 .9-.7 1.6-1.6 1.6h-1.4" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><rect x="7" y="13.4" width="10" height="7" rx="1.3" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/></svg>
      </button>
      <button class="ibtn" id="saveBtn" title="Save as PNG" aria-label="Save as PNG">
        <svg class="nav-ic" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 4v9.6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/><path d="m8 10.2 4 3.9 4-3.9" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4.5 15.6v2.8c0 .9.7 1.6 1.6 1.6h11.8c.9 0 1.6-.7 1.6-1.6v-2.8" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </header>

  <main class="stage">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="board" aria-label="Drawing canvas"></canvas>
      <canvas id="lines" aria-hidden="true"></canvas>
      <div id="cursorRing"></div>
      <p class="hint" id="hint">Loading your coloring page…</p>
    </div>

    <aside class="rail" id="rail" aria-label="Drawing toolbar">
      <div class="rail-tools" id="tools" role="toolbar" aria-label="Drawing tools">
        <button class="tbtn" data-tool="pencil" aria-pressed="true" aria-label="Pencil" title="Pencil"><em>✏️</em><span>Pencil</span></button>
        <button class="tbtn" data-tool="marker" aria-pressed="false" aria-label="Marker" title="Marker"><em>🖊️</em><span>Marker</span></button>
        <button class="tbtn" data-tool="crayon" aria-pressed="false" aria-label="Soft crayon" title="Soft crayon"><em>🖍️</em><span>Crayon</span></button>
        <button class="tbtn" data-tool="spray" aria-pressed="false" aria-label="Spray" title="Spray"><em>💨</em><span>Spray</span></button>
        <button class="tbtn" data-tool="fill" aria-pressed="false" aria-label="Paint can" title="Paint can"><em>🪣</em><span>Paint can</span></button>
        <button class="tbtn" data-tool="eraser" aria-pressed="false" aria-label="Eraser" title="Eraser"><em>🧽</em><span>Eraser</span></button>
      </div>
      <div class="rail-color">
        <button class="cc-btn" id="currentColor" aria-label="Current color" title="Current color — tap to change"><span class="cc-dot" id="ccDot"></span></button>
      </div>
      <div class="rail-colors" id="quickColors" role="group" aria-label="Colors">
        <button class="qsw light" data-color="#FFFFFF" style="--c:#FFFFFF" aria-pressed="false" aria-label="White" title="White"></button>
        <button class="qsw light" data-color="#FFF3B8" style="--c:#FFF3B8" aria-pressed="false" aria-label="Cream" title="Cream"></button>
        <button class="qsw light" data-color="#FFD3A8" style="--c:#FFD3A8" aria-pressed="false" aria-label="Peach" title="Peach"></button>
        <button class="qsw light" data-color="#F8BBD0" style="--c:#F8BBD0" aria-pressed="false" aria-label="Light pink" title="Light pink"></button>
        <button class="qsw light" data-color="#B5E3F7" style="--c:#B5E3F7" aria-pressed="false" aria-label="Light blue" title="Light blue"></button>
        <button class="qsw light" data-color="#D7C7EE" style="--c:#D7C7EE" aria-pressed="false" aria-label="Lavender" title="Lavender"></button>
        <button class="qsw light" data-color="#BCE8C9" style="--c:#BCE8C9" aria-pressed="false" aria-label="Mint" title="Mint"></button>
        <button class="qsw light" data-color="#FFD23F" style="--c:#FFD23F" aria-pressed="false" aria-label="Yellow" title="Yellow"></button>
        <button class="qsw" data-color="#F5892F" style="--c:#F5892F" aria-pressed="false" aria-label="Orange" title="Orange"></button>
        <button class="qsw" data-color="#E8443B" style="--c:#E8443B" aria-pressed="false" aria-label="Red" title="Red"></button>
        <button class="qsw" data-color="#F06292" style="--c:#F06292" aria-pressed="false" aria-label="Pink" title="Pink"></button>
        <button class="qsw" data-color="#9B4DCA" style="--c:#9B4DCA" aria-pressed="false" aria-label="Purple" title="Purple"></button>
        <button class="qsw" data-color="#4FC3F7" style="--c:#4FC3F7" aria-pressed="false" aria-label="Sky blue" title="Sky blue"></button>
        <button class="qsw" data-color="#1E63C7" style="--c:#1E63C7" aria-pressed="false" aria-label="Blue" title="Blue"></button>
        <button class="qsw" data-color="#26A69A" style="--c:#26A69A" aria-pressed="false" aria-label="Teal" title="Teal"></button>
        <button class="qsw" data-color="#43A047" style="--c:#43A047" aria-pressed="false" aria-label="Green" title="Green"></button>
        <button class="qsw" data-color="#8D5A3B" style="--c:#8D5A3B" aria-pressed="false" aria-label="Brown" title="Brown"></button>
        <button class="qsw" data-color="#9E9E9E" style="--c:#9E9E9E" aria-pressed="false" aria-label="Gray" title="Gray"></button>
        <button class="qsw" data-color="#9C2B2B" style="--c:#9C2B2B" aria-pressed="false" aria-label="Dark red" title="Dark red"></button>
        <button class="qsw" data-color="#1B5E20" style="--c:#1B5E20" aria-pressed="false" aria-label="Dark green" title="Dark green"></button>
        <button class="qsw" data-color="#1A3C8C" style="--c:#1A3C8C" aria-pressed="false" aria-label="Navy" title="Navy"></button>
        <button class="qsw" data-color="#5E35B1" style="--c:#5E35B1" aria-pressed="false" aria-label="Dark purple" title="Dark purple"></button>
        <button class="qsw" data-color="#4E342E" style="--c:#4E342E" aria-pressed="false" aria-label="Dark brown" title="Dark brown"></button>
        <button class="qsw" data-color="#2B2B2B" style="--c:#2B2B2B" aria-pressed="false" aria-label="Black" title="Black"></button>
      </div>
      <div class="rail-size">
        <span class="lbl">Size</span>
        <input type="range" id="size" min="2" max="40" value="10" step="1" aria-label="Brush and stamp size">
        <span id="preview"><span id="previewDot"></span></span>
      </div>
      <div class="rail-history" role="group" aria-label="History">
        <button class="ibtn" id="undoBtn" title="Undo" aria-label="Undo">↩️</button>
        <button class="ibtn" id="redoBtn" title="Redo" aria-label="Redo">↪️</button>
        <button class="ibtn" id="clearBtn" title="Clear canvas" aria-label="Clear canvas">🗑️</button>
      </div>
      <div class="rail-setting">
        <button class="lh-toggle" id="leftHandBtn" role="switch" aria-checked="false" title="Left-handed mode">
          <span class="lh-ico" aria-hidden="true">🤚</span><span class="lh-txt">Left-handed</span>
        </button>
      </div>
    </aside>

  </main>

  <nav class="dock" aria-label="Coloring pages and stickers">
    <div class="mode-row">
      <button class="chip on" id="modePage">🎨 Coloring page</button>
      <button class="chip" id="modeStamp">🐾 Sticker stamp</button>
    </div>
    <div class="hstrip pals" id="stampGrid"></div>
  </nav>
</div>

<div id="toast" hidden></div>

<script src="pals.js?v=2"></script>
<script src="app.js?v=13"></script>
</body>
</html>
