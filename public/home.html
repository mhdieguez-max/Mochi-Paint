<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mochi Paint Coloring Pages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:'Quicksand',system-ui,sans-serif;color:#5A4A42;background:linear-gradient(180deg,#FDEFF6 0%,#F0EAFB 46%,#E4F0FD 100%);min-height:100vh}
    body:before,body:after{content:"";position:fixed;border-radius:50%;filter:blur(78px);opacity:.55;pointer-events:none}
    body:before{width:360px;height:360px;background:#FBD3E5;top:-120px;left:-120px}
    body:after{width:400px;height:400px;background:#D7E5FB;right:-135px;bottom:-135px}
    .shell{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:22px 22px 50px}
    .nav{display:flex;align-items:center;justify-content:space-between;gap:18px}
    .brand{display:flex;align-items:center;gap:8px;font-family:'Baloo 2',cursive;font-weight:800;font-size:22px;color:#B0567F;background:rgba(255,255,255,.68);padding:8px 18px;border-radius:999px;box-shadow:0 2px 8px rgba(200,150,190,.2);white-space:nowrap}
    .links{display:flex;gap:14px;flex-wrap:wrap;justify-content:flex-end}
    .links a{color:#7A6861;text-decoration:none;font-size:14px;font-weight:800;background:rgba(255,255,255,.58);padding:8px 13px;border-radius:999px}
    .hero{text-align:center;padding:34px 0 26px}
    .hero-img{display:block;width:min(1180px,94vw);height:auto;margin:0 auto 24px;border-radius:30px;box-shadow:0 14px 34px rgba(150,120,160,.22)}
    h1{font-family:'Baloo 2',cursive;font-size:clamp(34px,6vw,52px);line-height:1.06;margin:0;color:#6B5350}
    .sub{max-width:700px;margin:10px auto 0;font-size:18px;line-height:1.45;color:#81706A;font-weight:700}
    .cta{display:inline-flex;align-items:center;gap:9px;margin-top:20px;border:none;background:#EF7DA5;color:#fff;font-family:'Baloo 2',cursive;font-size:20px;font-weight:800;padding:14px 30px;border-radius:999px;text-decoration:none;box-shadow:0 10px 26px rgba(177,77,116,.35)}
    .section{position:relative;padding:45px 22px 56px;margin:18px 0;border-radius:46px;background:var(--bg)}
    .section-head{text-align:center;margin-bottom:26px}
    .section-head span{font-size:36px}
    h2{font-family:'Baloo 2',cursive;font-size:31px;margin:0;color:#5A4A42}
    .tagline{max-width:660px;margin:4px auto 0;color:#81706A;font-weight:700;line-height:1.42}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,160px));gap:14px;justify-content:center}
    .card{display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none;background:#fff;border:3px solid var(--accent);border-radius:20px;padding:16px 10px 15px;box-shadow:0 8px 20px rgba(150,120,140,.16);transition:transform .15s,box-shadow .15s}
    .card:hover{transform:translateY(-4px);box-shadow:0 13px 24px rgba(150,120,140,.22)}
    .art{width:92px;height:92px;display:block;border-radius:22px;background:linear-gradient(180deg,#FFF,#FFF8FB)}
    .name{font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;color:#6B5350;line-height:1}
    .species{font-size:11px;font-weight:800;color:#A08F88;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
    .pill{font-size:12px;font-weight:800;color:#fff;background:var(--accent);padding:5px 14px;border-radius:999px;margin-top:3px}
    footer{text-align:center;padding:20px;color:#A08F88;font-weight:800}
    @media(max-width:760px){
      .shell{padding:14px 12px 36px}
      .nav{justify-content:center}.links{display:none}
      .hero-img{width:100%;border-radius:22px}
      .section{padding:34px 12px 44px;border-radius:34px}
      .grid{grid-template-columns:repeat(2,minmax(0,1fr));max-width:344px;margin:0 auto;gap:12px}
      .art{width:78px;height:78px;font-size:48px}
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav">
      <div class="brand"><span>🍡</span><span>Mochi Paint</span></div>
      <div class="links" id="links"></div>
    </nav>

    <header class="hero">
      <img class="hero-img" src="/mochi-home-hero.png" alt="Mochi Paint pals standing under a pink awning in a sunny kawaii field">
      <h1>Grab a color, meet a pal,<br>make something cute</h1>
      <p class="sub">Thirty-two chunky little friends are waiting below, sorted into cozy little worlds. Pick one, follow the trail, and start coloring.</p>
      <a class="cta" href="/?pal=panpan"><span>Start coloring Panpan</span><span>→</span></a>
    </header>

    <main id="groups"></main>
    <footer>🍡 Made with love, one pal at a time - Mochi Paint</footer>
  </div>

  <script>
    const groups = [
      { slug:"meadow", icon:"🌿", title:"Meadow Pals", accent:"#6FAE6B", bg:"linear-gradient(160deg,#EAF7E9,#F5FBF0)", tagline:"Soft grass, buzzing bees, and lily pads - gentle friends from the flower path.", pals:[
        ["usagi","Usagi","bunny","🐰"],["fuwa","Fuwa","sheep","🐑"],["kero","Kero","frog","🐸"],["hachi","Hachi","bee","🐝"]
      ]},
      { slug:"barnyard", icon:"🌾", title:"Barnyard Pals", accent:"#D69A3E", bg:"linear-gradient(160deg,#FCF3DC,#FFFBF2)", tagline:"The cheerful farmyard crew, always up early and ready for color.", pals:[
        ["miruku","Miruku","cow","🐮"],["kobo","Kobo","puppy","🐶"],["piyo","Piyo","chick","🐥"],["kamo","Kamo","duck","🦆"]
      ]},
      { slug:"snow", icon:"❄️", title:"Snow Pals", accent:"#5B95C9", bg:"linear-gradient(160deg,#E6F1FB,#F5FAFF)", tagline:"Frosty friends for cool blues, cozy scarves, and soft snowy colors.", pals:[
        ["yuki","Yuki","pom pup","🐶"],["kori","Kori","polar bear","🐻‍❄️"],["panpan","Panpan","panda","🐼"],["pen","Pen","penguin","🐧"]
      ]},
      { slug:"den", icon:"🏡", title:"Cozy Den Pals", accent:"#C4708E", bg:"linear-gradient(160deg,#FBEAF0,#FFF6F9)", tagline:"The homebodies who curl up by the fire and round out the family.", pals:[
        ["mochi","Mochi","cat loaf","🐱"],["kuma","Kuma","bear","🐻"],["hamu","Hamu","hamster","🐹"],["hari","Hari","hedgehog","🦔"]
      ]},
      { slug:"dinosaurs", icon:"🦖", title:"Dinosaur Pals", accent:"#67A65F", bg:"linear-gradient(160deg,#E8F6DD,#FFFDF4)", tagline:"Big roars, tiny smiles, leafy spikes, and prehistoric coloring fun.", pals:[
        ["rexi","Rexi","t-rex","🦖"],["trixie","Trixie","triceratops","🦕"],["spike","Spike","stegosaurus","🦕"],["ptera","Ptera","pterodactyl","🪽"]
      ]},
      { slug:"mermaids", icon:"🧜‍♀️", title:"Mermaid Cove", accent:"#48AFC0", bg:"linear-gradient(160deg,#DDF7F7,#F5FDFF)", tagline:"Sea-sparkle pages with shells, waves, tails, and friendly ocean pals.", pals:[
        ["marina","Marina","mermaid","🧜‍♀️"],["coral","Coral","seahorse","🌊"],["jelli","Jelli","jellyfish","🪼"],["splash","Splash","dolphin","🐬"]
      ]},
      { slug:"halloween", icon:"🎃", title:"Halloween Pals", accent:"#D37A35", bg:"linear-gradient(160deg,#FFF1DE,#F6EEFF)", tagline:"Pumpkins, costumes, moonlight, and sweet little spooky pages.", pals:[
        ["patch","Patch","pumpkin","🎃"],["boo","Boo","ghost","👻"],["miso","Miso","witch cat","🐈‍⬛"],["nox","Nox","bat","🦇"]
      ]},
      { slug:"christmas", icon:"🎄", title:"Christmas Pals", accent:"#C94F5D", bg:"linear-gradient(160deg,#EAF8EF,#FFF7F7)", tagline:"Holiday pages for red noses, snow days, ornaments, and warm cocoa colors.", pals:[
        ["rudy","Rudy","reindeer","🦌"],["flurry","Flurry","snowman","☃️"],["piney","Piney","christmas tree","🎄"],["noel","Noel","santa bear","🎅"]
      ]}
    ];

    const links = document.getElementById("links");
    const main = document.getElementById("groups");

    groups.forEach((group) => {
      const nav = document.createElement("a");
      nav.href = "#" + group.slug;
      nav.textContent = group.title;
      links.appendChild(nav);

      const section = document.createElement("section");
      section.className = "section";
      section.id = group.slug;
      section.style.setProperty("--accent", group.accent);
      section.style.setProperty("--bg", group.bg);
      section.innerHTML = `
        <div class="section-head">
          <span>${group.icon}</span>
          <h2>${group.title}</h2>
          <p class="tagline">${group.tagline}</p>
        </div>
        <div class="grid"></div>
      `;
      const grid = section.querySelector(".grid");
      group.pals.forEach(([slug, name, species]) => {
        const card = document.createElement("a");
        card.className = "card";
        card.href = "/?pal=" + encodeURIComponent(slug);
        card.innerHTML = `
          <canvas class="art" width="184" height="184" data-pal="${slug}" aria-hidden="true"></canvas>
          <div class="name">${name}</div>
          <div class="species">the ${species}</div>
          <div class="pill">Color me →</div>
        `;
        grid.appendChild(card);
      });
      main.appendChild(section);
    });

    const TAU = Math.PI * 2;
    const palLooks = {
      usagi:["bunny","#FDFBF7","#F6CFD6"], fuwa:["sheep","#FDFBF6","#D9D3D6"], kero:["frog","#A8D8A0","#E8F4DE"], hachi:["bee","#FFDE7A","#6B5347"],
      miruku:["cow","#FDFCF8","#4E4A50"], kobo:["puppy","#EBC79B","#C89468"], piyo:["chick","#FFE38F","#F5A25D"], kamo:["duck","#FCF6E3","#F5A25D"],
      yuki:["pom","#FFFDFB","#C9CDD6"], kori:["bear","#FCFBF7","#DDEAF5"], panpan:["panda","#FCFBF7","#3E3A3C"], pen:["penguin","#4E5A66","#FDFCF8"],
      mochi:["cat","#F7E7CF","#E5C193"], kuma:["bear","#B9855C","#F2DBBB"], hamu:["hamster","#F2D8B8","#FCF6EC"], hari:["hedgehog","#C79B6E","#F5E3C8"],
      rexi:["dino","#9AD17B","#C6E58A"], trixie:["triceratops","#D8B66A","#F7E7BE"], spike:["stego","#78C6A3","#F3B6C7"], ptera:["ptero","#B8A0D8","#F6DCA8"],
      marina:["mermaid","#79D1C3","#9B6BCB"], coral:["seahorse","#7EC9D4","#F6C6D5"], jelli:["jelly","#C6A7ED","#F6C6D5"], splash:["dolphin","#87BFE8","#D9F2FF"],
      patch:["pumpkin","#FFB45C","#7DA35C"], boo:["ghost","#FCFBFF","#DAD7EA"], miso:["witchcat","#4B4656","#7B5AA6"], nox:["bat","#5C5674","#7A7294"],
      rudy:["reindeer","#C18A5A","#F2D4AD"], flurry:["snowman","#FDFEFF","#E85F5C"], piney:["tree","#69B65E","#FFE082"], noel:["santabear","#B9855C","#E85F5C"]
    };

    function drawPal(canvas) {
      const slug = canvas.dataset.pal;
      const look = palLooks[slug] || ["bear","#F7E7CF","#E5C193"];
      const ctx = canvas.getContext("2d");
      const d = canvas.width;
      ctx.clearRect(0, 0, d, d);
      ctx.save();
      ctx.translate(d / 2, d / 2 + 4);
      ctx.scale(d / 110, d / 110);
      ctx.lineWidth = 3.6;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "rgba(90,74,66,.62)";

      function e(x,y,rx,ry,fill,rot=0){ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot,0,TAU);ctx.fillStyle=fill;ctx.fill();ctx.stroke();}
      function c(x,y,r,fill){e(x,y,r,r,fill);}
      function tri(a,b,c0,fill){ctx.beginPath();ctx.moveTo(...a);ctx.lineTo(...b);ctx.lineTo(...c0);ctx.closePath();ctx.fillStyle=fill;ctx.fill();ctx.stroke();}
      function eye(x,y,r=4){c(x,y,r,"#4A3B36");c(x-1.2,y-1.2,r*.34,"#fff");}
      function cheek(x,y){e(x,y,6,4,"rgba(244,143,177,.46)");}
      function mouth(x,y){ctx.beginPath();ctx.arc(x-3,y,3,0,Math.PI);ctx.arc(x+3,y,3,0,Math.PI);ctx.stroke();}
      function face(fill, accent) {
        c(-20,-22,10,fill); c(20,-22,10,fill);
        c(0,0,30,fill);
        e(0,10,14,10,accent);
        eye(-10,-4); eye(10,-4); c(0,5,3.2,"#4A3B36"); mouth(0,10);
        cheek(-19,8); cheek(19,8);
      }

      const [type, fill, accent] = look;
      if (type === "bunny") { e(-12,-30,8,22,fill,-.1); e(12,-30,8,22,fill,.1); face(fill, accent); }
      else if (type === "sheep") { for(let i=0;i<8;i++){let a=i/8*TAU;c(Math.cos(a)*22,Math.sin(a)*18-4,11,fill);} face(fill, accent); }
      else if (type === "frog") { c(-15,-24,11,fill); c(15,-24,11,fill); c(0,3,31,fill); eye(-15,-25); eye(15,-25); mouth(0,3); cheek(-22,7); cheek(22,7); }
      else if (type === "bee") { e(-32,0,9,16,"rgba(255,255,255,.9)",.4); e(32,0,9,16,"rgba(255,255,255,.9)",-.4); c(0,5,29,fill); ctx.beginPath();ctx.moveTo(-24,10);ctx.lineTo(24,10);ctx.moveTo(-21,22);ctx.lineTo(21,22);ctx.stroke(); eye(-10,-4); eye(10,-4); mouth(0,4); }
      else if (type === "cow") { face(fill, "#F6CFD6"); e(-13,-5,10,8,accent,.4); e(17,15,9,7,accent,-.4); }
      else if (type === "puppy") { e(-28,-16,8,15,accent,.5); e(28,-16,8,15,accent,-.5); face(fill, "#FCF7EF"); c(27,18,8,accent); }
      else if (type === "chick" || type === "duck") { c(0,4,30,fill); eye(-10,-5); eye(10,-5); tri([-5,4],[5,4],[0,12],accent); cheek(-18,7); cheek(18,7); }
      else if (type === "pom") { tri([-23,-5],[-18,-28],[-8,-12],fill); tri([23,-5],[18,-28],[8,-12],fill); face(fill, accent); c(31,4,9,fill); }
      else if (type === "panda") { c(-18,-24,10,accent); c(18,-24,10,accent); face(fill, "#FCFBF7"); e(-10,-5,7,9,accent,.3); e(10,-5,7,9,accent,-.3); }
      else if (type === "penguin") { c(0,5,31,fill); e(0,11,20,19,accent); eye(-10,-5); eye(10,-5); tri([-5,3],[5,3],[0,11],"#F5A25D"); cheek(-18,5); cheek(18,5); }
      else if (type === "cat") { tri([-25,-7],[-19,-30],[-7,-13],fill); tri([25,-7],[19,-30],[7,-13],fill); face(fill, accent); }
      else if (type === "hamster" || type === "bear") { face(fill, accent); }
      else if (type === "hedgehog") { for(let i=0;i<7;i++){let a=Math.PI+i/6*Math.PI;c(Math.cos(a)*23,Math.sin(a)*20+3,10,fill);} face(accent, accent); }
      else if (type === "dino" || type === "triceratops" || type === "stego" || type === "ptero") {
        e(-6,10,29,20,fill); e(22,-8,18,15,fill); tri([-33,9],[-51,0],[-34,21],fill);
        if (type === "stego") for(let i=0;i<4;i++) tri([-25+i*13,-6],[-19+i*13,-25],[-12+i*13,-6],accent);
        if (type === "triceratops") { e(18,-17,29,11,accent); tri([8,-23],[-1,-41],[16,-27],"#FFF3CE"); tri([28,-23],[37,-41],[20,-27],"#FFF3CE"); }
        if (type === "ptero") { tri([-10,-9],[-45,-31],[-28,18],accent); tri([10,-9],[45,-31],[28,18],accent); }
        eye(18,-11); mouth(25,-1); cheek(31,1);
      }
      else if (type === "mermaid") { e(0,12,13,21,fill); tri([0,34],[-13,18],[13,18],fill); c(0,-24,15,"#F4C7A1"); for(let i=0;i<5;i++) c(-14+i*7,-34+Math.sin(i)*2,6,accent); eye(-5,-25,3); eye(5,-25,3); mouth(0,-18); }
      else if (type === "seahorse") { e(2,-5,18,30,fill); e(12,-35,15,11,fill); tri([24,-35],[40,-31],[24,-25],fill); eye(13,-37,3); ctx.beginPath();ctx.arc(0,33,15,1.5*Math.PI,.25*Math.PI);ctx.stroke(); }
      else if (type === "jelly") { e(0,-13,29,21,fill); for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(-20+i*10,8);ctx.quadraticCurveTo(-26+i*10,24,-17+i*10,39);ctx.stroke();} eye(-9,-17,3.5); eye(9,-17,3.5); mouth(0,-10); }
      else if (type === "dolphin") { e(2,0,35,16,fill,-.15); tri([-27,0],[-49,-14],[-42,13],fill); tri([0,-11],[12,-32],[16,-9],fill); eye(23,-5,3); mouth(30,3); }
      else if (type === "pumpkin") { e(-12,7,19,26,fill); e(12,7,19,26,fill); e(0,7,21,29,"#FFB45C"); tri([-5,-22],[5,-22],[0,-38],accent); eye(-9,3,3.5); eye(9,3,3.5); mouth(0,14); }
      else if (type === "ghost") { c(0,-6,28,fill); ctx.fillStyle=fill;ctx.fillRect(-28,-6,56,35);ctx.strokeRect(-28,-6,56,35); eye(-9,-10); eye(9,-10); e(0,3,5,7,"#4A3B36"); }
      else if (type === "witchcat") { tri([-25,-14],[0,-50],[25,-14],accent); e(0,-14,33,5,accent); tri([-21,0],[-16,-21],[-8,-7],fill); tri([21,0],[16,-21],[8,-7],fill); face(fill, "#5B5363"); }
      else if (type === "bat") { c(0,1,20,fill); tri([-17,-2],[-48,-22],[-36,20],accent); tri([17,-2],[48,-22],[36,20],accent); eye(-7,-2,3); eye(7,-2,3); mouth(0,6); }
      else if (type === "reindeer") { ctx.beginPath();ctx.moveTo(-13,-22);ctx.lineTo(-23,-42);ctx.moveTo(13,-22);ctx.lineTo(23,-42);ctx.stroke(); face(fill, accent); c(0,5,4,"#E85F5C"); }
      else if (type === "snowman") { c(0,17,24,fill); c(0,-17,18,fill); e(0,-40,22,4,"#5B6B84"); e(0,-49,13,9,"#5B6B84"); eye(-6,-20,3); eye(6,-20,3); tri([2,-14],[17,-10],[2,-6],"#F5A25D"); }
      else if (type === "tree") { tri([0,-43],[-24,-8],[24,-8],fill); tri([0,-25],[-31,16],[31,16],"#5FA855"); e(0,31,8,10,"#A9784D"); c(-10,-5,3.5,"#F48FB1"); c(12,7,3.5,accent); }
      else if (type === "santabear") { tri([-18,-20],[8,-48],[22,-20],accent); c(12,-48,5,"#fff"); e(0,-20,25,5,"#fff"); face(fill, "#F2DBBB"); }
      else face(fill, accent);
      ctx.restore();
    }

    document.querySelectorAll("canvas[data-pal]").forEach(drawPal);
  </script>
</body>
</html>
